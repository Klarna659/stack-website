<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stack — 03 Minimal</title>
<style>
  @font-face{font-family:"Inter";src:url("../assets/fonts/InterVariable.ttf") format("truetype-variations");font-weight:100 900;font-display:swap}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#ffffff;color:#0a0a0a;font-family:"Inter",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  body{min-height:100vh;display:flex;flex-direction:column}
  header{padding:28px 36px;display:flex;justify-content:space-between;align-items:center}
  .brand{display:flex;gap:8px;align-items:center;font-weight:600;letter-spacing:-.01em;font-size:15px}
  .brand .dot{width:8px;height:8px;border-radius:999px;background:#0a0a0a}
  nav{display:flex;gap:32px;font-size:13.5px;color:#666;font-weight:500}

  main{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:0 28px 80px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#999;font-weight:500;margin-bottom:60px}
  h1{font-size:clamp(48px,9vw,128px);font-weight:500;letter-spacing:-.05em;line-height:.96;max-width:1100px;margin:0 auto}
  h1 .lh{color:#a8a8a8;font-weight:300}
  .sub{margin:48px auto 0;color:#555;font-size:18px;max-width:440px;line-height:1.55}
  .cta{margin-top:56px;display:inline-flex;gap:8px;align-items:center;font-size:15px;font-weight:500;border-bottom:1.5px solid #0a0a0a;padding-bottom:6px}
  .cta span{transition:transform .3s}
  footer{padding:32px 36px;display:flex;justify-content:space-between;font-size:12.5px;color:#999;border-top:1px solid #f0f0ec}
  footer .right{display:flex;gap:24px}
  .hairline{height:1px;width:60px;background:#0a0a0a;margin:0 auto 60px}
  @media (max-width:700px){.eyebrow{margin-bottom:40px}.sub{margin-top:36px}.cta{margin-top:42px}}
</style></head>
<body>
<header>
  <a class="brand"><span class="dot"></span> Stack</a>
  <nav><a>What it is</a><a>Get</a></nav>
</header>
<main>
  <div class="eyebrow">Stack 01 · Coming soon</div>
  <h1><span class="lh">Track</span><br>your stack.</h1>
  <p class="sub">A quieter way to keep every supplement, peptide, dose and refill in one place.</p>
  <a class="cta">Be first to download <span>→</span></a>
</main>
<footer>
  <span>© 2026 Stack</span>
  <div class="right"><span>Privacy</span><span>Terms</span><span>hello@trackyourstack.app</span></div>
</footer>
</body></html>
